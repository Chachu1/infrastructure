# Gateway configuration
gateway_interface: "eth0"

# Caddy reverse proxy hosts
caddy_hosts:
  - domain: "uptime.{{ domain }}"
    backend: "10.0.0.51"
    port: 3001

# WireGuard configuration
wireguard_address: "10.10.0.1/24"
wireguard_port: 51820
wireguard_private_key: "{{ vault_wireguard_private_key | default('') }}"
wireguard_public_key: "{{ vault_wireguard_public_key | default('') }}"

wireguard_peers: []

# CoreDNS
dns_records:
  gateway: "{{ gateway_ip }}"
  uptime-kuma: "10.0.0.51"

# nftables
nftables_forward_ports:
  - proto: tcp
    dport: 80
    dest: "{{ gateway_ip }}"
    dest_port: 80
  - proto: tcp
    dport: 443
    dest: "{{ gateway_ip }}"
    dest_port: 443
  - proto: udp
    dport: 51820
    dest: "{{ gateway_ip }}"
    dest_port: 51820
