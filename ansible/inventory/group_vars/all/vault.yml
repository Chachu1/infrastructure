---
# Ansible Vault - encrypted secrets
# To edit: ansible-vault edit ansible/inventory/group_vars/all/vault.yml

vault_wireguard_private_key: "PLACEHOLDER_PRIVATE_KEY"
vault_wireguard_public_key: "PLACEHOLDER_PUBLIC_KEY"
vault_wg_laptop_public_key: "PLACEHOLDER_LAPTOP_KEY"
vault_wg_phone_public_key: "PLACEHOLDER_PHONE_KEY"
vault_cloudflare_api_token: "PLACEHOLDER_CLOUDFLARE_TOKEN"
