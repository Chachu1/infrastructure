---
# site.yml - full infrastructure run
#
# This is a thin aggregator: each host has its own playbook under
# playbooks/hosts/<name>.yml which is the single source of truth for
# exactly what gets applied to that host. Add a new VM/LXC in
# terraform/locals.tf, then add a matching playbooks/hosts/<name>.yml
# and an import_playbook line below.
#
# Idempotent - safe to run against everything on every push.

- import_playbook: hosts/proxmox.yml
- import_playbook: hosts/gateway.yml
- import_playbook: hosts/uptime-kuma.yml
- import_playbook: hosts/postgres.yml
