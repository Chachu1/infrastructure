---
# Master playbook - runs everything

- name: Bootstrap Python on all hosts
  hosts: all
  gather_facts: false
  tasks:
    - name: Wait for SSH
      wait_for_connection:
        timeout: 60

    - name: Install Python
      raw: which python3 || (apt-get update -qq || true; apt-get install -y -qq python3)
      changed_when: false

    - name: Gather facts
      setup:

- name: Configure Proxmox host
  hosts: proxmox_host
  roles:
    - proxmox_host

- name: Configure gateway
  hosts: gateway
  vars_files:
    - ../inventory/group_vars/gateway_services.yml
  roles:
    - common
    - gateway_network
    - caddy
    - wireguard
    - dns

- name: Configure application VMs
  hosts: apps
  roles:
    - common
    - docker_host

- name: Install QEMU guest agent on VMs
  hosts: vm_apps
  tasks:
    - name: Install qemu-guest-agent
      apt:
        name: qemu-guest-agent
        state: present

    - name: Ensure qemu-guest-agent is running
      systemd:
        name: qemu-guest-agent
        state: started
        enabled: yes
      ignore_errors: yes

- name: Deploy uptime-kuma
  hosts: uptime-kuma
  roles:
    - uptime_kuma
