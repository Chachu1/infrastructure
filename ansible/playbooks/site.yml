---
# Master playbook - runs everything

- name: Configure Proxmox host
  hosts: proxmox_host
  roles:
    - proxmox_host

- name: Configure gateway
  hosts: gateway
  vars_files:
    - ../inventory/group_vars/gateway_services.yml
  roles:
    - common
    - gateway_network
    - caddy
    - wireguard
    - dns

- name: Configure application VMs
  hosts: apps
  roles:
    - common
    - docker_host

- name: Install QEMU guest agent on VMs
  hosts: vm_apps
  tasks:
    - name: Install qemu-guest-agent
      apt:
        name: qemu-guest-agent
        state: present

    - name: Ensure qemu-guest-agent is running
      systemd:
        name: qemu-guest-agent
        state: started
        enabled: yes

- name: Deploy uptime-kuma
  hosts: uptime-kuma
  roles:
    - uptime_kuma
