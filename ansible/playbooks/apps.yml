---
# Apps playbook - configure application VMs only

- name: Configure application VMs
  hosts: apps
  roles:
    - common
    - docker_host

- name: Install QEMU guest agent on VMs
  hosts: vm_apps
  tasks:
    - name: Install qemu-guest-agent
      apt:
        name: qemu-guest-agent
        state: present

    - name: Ensure qemu-guest-agent is running
      systemd:
        name: qemu-guest-agent
        state: started
        enabled: yes

- name: Deploy uptime-kuma
  hosts: uptime-kuma
  roles:
    - uptime_kuma
