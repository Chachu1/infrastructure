---
# testing-vm - general-purpose test VM (Docker), QEMU guest agent
# Run standalone: ansible-playbook playbooks/hosts/testing-vm.yml

- name: Bootstrap testing-vm
  hosts: testing-vm
  gather_facts: false
  tasks:
    - name: Wait for SSH
      wait_for_connection:
        timeout: 60

    - name: Install Python
      raw: which python3 || (apt-get update -qq || true; apt-get install -y -qq python3)
      changed_when: false

    - name: Gather facts
      setup:

- name: Configure testing-vm
  hosts: testing-vm
  roles:
    - common
    - docker_host

  tasks:
    - name: Install qemu-guest-agent
      apt:
        name: qemu-guest-agent
        state: present

    - name: Ensure qemu-guest-agent is running
      systemd:
        name: qemu-guest-agent
        state: started
        enabled: yes
      ignore_errors: yes
