---
- name: Deploy cloud image update script
  ansible.builtin.copy:
    src: update-cloud-images.sh
    dest: /usr/local/bin/update-cloud-images.sh
    mode: "0755"

- name: Deploy systemd service unit
  ansible.builtin.copy:
    src: update-cloud-images.service
    dest: /etc/systemd/system/update-cloud-images.service

- name: Deploy systemd timer unit
  ansible.builtin.copy:
    src: update-cloud-images.timer
    dest: /etc/systemd/system/update-cloud-images.timer

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start cloud image update timer
  ansible.builtin.systemd:
    name: update-cloud-images.timer
    enabled: true
    state: started

- name: Install iptables-persistent
  apt:
    name: iptables-persistent
    state: present

- name: Ensure DNAT rules exist
  shell: |
    set -e
    rules() {
      iptables -t nat -C PREROUTING -i eno1 -p tcp --dport 80 -j DNAT --to-destination {{ gateway_ip }}:80 2>/dev/null || \
        iptables -t nat -A PREROUTING -i eno1 -p tcp --dport 80 -j DNAT --to-destination {{ gateway_ip }}:80
      iptables -t nat -C PREROUTING -i eno1 -p tcp --dport 443 -j DNAT --to-destination {{ gateway_ip }}:443 2>/dev/null || \
        iptables -t nat -A PREROUTING -i eno1 -p tcp --dport 443 -j DNAT --to-destination {{ gateway_ip }}:443
      iptables -t nat -C PREROUTING -i eno1 -p udp --dport 51820 -j DNAT --to-destination {{ gateway_ip }}:51820 2>/dev/null || \
        iptables -t nat -A PREROUTING -i eno1 -p udp --dport 51820 -j DNAT --to-destination {{ gateway_ip }}:51820
      iptables -t nat -C POSTROUTING -s {{ private_subnet }} -o eno1 -j MASQUERADE 2>/dev/null || \
        iptables -t nat -A POSTROUTING -s {{ private_subnet }} -o eno1 -j MASQUERADE
    }
    rules
    iptables-save > /etc/iptables/rules.v4
  changed_when: false
