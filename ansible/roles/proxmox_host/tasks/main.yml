---
- name: Deploy cloud image update script
  ansible.builtin.copy:
    src: update-cloud-images.sh
    dest: /usr/local/bin/update-cloud-images.sh
    mode: "0755"

- name: Deploy systemd service unit
  ansible.builtin.copy:
    src: update-cloud-images.service
    dest: /etc/systemd/system/update-cloud-images.service

- name: Deploy systemd timer unit
  ansible.builtin.copy:
    src: update-cloud-images.timer
    dest: /etc/systemd/system/update-cloud-images.timer

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start cloud image update timer
  ansible.builtin.systemd:
    name: update-cloud-images.timer
    enabled: true
    state: started

- name: Block direct Proxmox UI access except from gateway
  shell: |
    iptables -C INPUT -p tcp --dport 8006 -s 10.0.0.10 -j ACCEPT 2>/dev/null || \
      iptables -I INPUT 1 -p tcp --dport 8006 -s 10.0.0.10 -j ACCEPT
    iptables -C INPUT -p tcp --dport 8006 -j DROP 2>/dev/null || \
      iptables -I INPUT 2 -p tcp --dport 8006 -j DROP
  changed_when: false
