---
- name: Install prerequisites
  apt:
    name:
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: yes

- name: Create APT keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add PostgreSQL GPG key
  shell:
    cmd: curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc -o /etc/apt/keyrings/postgresql.asc

- name: Add PostgreSQL APT repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/postgresql.asc] https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
    state: present
    filename: pgdg

- name: Install PostgreSQL 18
  apt:
    name:
      - postgresql-18
      - postgresql-client-18
    state: present
    update_cache: yes
  notify: restart postgresql

- name: Configure PostgreSQL listen addresses
  lineinfile:
    path: /etc/postgresql/18/main/postgresql.conf
    regexp: "^#?listen_addresses\\s*="
    line: "listen_addresses = '*'"
  notify: restart postgresql

- name: Allow scram-sha-256 auth from internal subnet
  lineinfile:
    path: /etc/postgresql/18/main/pg_hba.conf
    regexp: "^#?host\\s+all\\s+all\\s+{{ private_subnet | replace('.', '\\.') }}\\s"
    line: "host    all             all             {{ private_subnet }}        scram-sha-256"
    insertbefore: "^#?host\\s+all\\s+all"
  notify: restart postgresql

- name: Start and enable PostgreSQL
  systemd:
    name: postgresql
    state: started
    enabled: yes

- name: Flush handlers to apply config before creating user
  meta: flush_handlers

- name: Create superuser mohsin
  become: yes
  become_user: postgres
  shell:
    cmd: |
      psql -tc "SELECT 1 FROM pg_roles WHERE rolname='mohsin'" | grep -q 1 || \
      psql -c "CREATE ROLE mohsin WITH LOGIN SUPERUSER PASSWORD '{{ vault_postgres_mohsin_password }}'"
  changed_when: false
