---
- name: Install prerequisites
  apt:
    name:
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: yes

- name: Create APT keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add PostgreSQL GPG key
  shell:
    cmd: curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc -o /etc/apt/keyrings/postgresql.asc

- name: Add PostgreSQL APT repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/postgresql.asc] https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
    state: present
    filename: pgdg

- name: Install PostgreSQL 18
  apt:
    name:
      - postgresql-18
      - postgresql-client-18
    state: present
    update_cache: yes
  notify: restart postgresql

- name: Reinit cluster as UTF8 if currently SQL_ASCII
  block:
    - name: Check current cluster encoding
      become: yes
      become_user: postgres
      shell: psql -tAc "SELECT pg_encoding_to_char(encoding) FROM pg_database WHERE datname='template0'"
      register: pg_encoding
      changed_when: false

    - name: Reinit cluster as UTF8
      when: pg_encoding.stdout | trim == 'SQL_ASCII'
      block:
        - name: Stop PostgreSQL
          systemd:
            name: postgresql
            state: stopped

        - name: Drop existing empty SQL_ASCII cluster
          shell: pg_dropcluster 18 main --stop

        - name: Recreate cluster as UTF8
          shell: pg_createcluster 18 main --encoding=UTF8 --locale=C.UTF-8 --start

- name: Configure PostgreSQL listen addresses
  lineinfile:
    path: /etc/postgresql/18/main/postgresql.conf
    regexp: "^#?listen_addresses\\s*="
    line: "listen_addresses = '*'"
  notify: restart postgresql

- name: Allow scram-sha-256 auth from internal subnet
  lineinfile:
    path: /etc/postgresql/18/main/pg_hba.conf
    regexp: "^#?host\\s+all\\s+all\\s+{{ private_subnet | replace('.', '\\.') }}\\s"
    line: "host    all             all             {{ private_subnet }}        scram-sha-256"
    insertbefore: "^#?host\\s+all\\s+all"
  notify: restart postgresql

- name: Start and enable PostgreSQL
  systemd:
    name: postgresql
    state: started
    enabled: yes

- name: Flush handlers to apply config before creating user
  meta: flush_handlers

- name: Create superuser mohsin
  become: yes
  become_user: postgres
  shell:
    cmd: |
      psql -tc "SELECT 1 FROM pg_roles WHERE rolname='mohsin'" | grep -q 1 || \
      psql -c "CREATE ROLE mohsin WITH LOGIN SUPERUSER PASSWORD '{{ lookup('env', 'POSTGRES_MOHSIN_PASSWORD') }}'"
  changed_when: false
  no_log: true

- name: Create superuser pricetracker
  become: yes
  become_user: postgres
  shell:
    cmd: |
      psql -tc "SELECT 1 FROM pg_roles WHERE rolname='pricetracker'" | grep -q 1 || \
      psql -c "CREATE ROLE pricetracker WITH LOGIN SUPERUSER PASSWORD '{{ lookup('env', 'POSTGRES_PRICETRACKER_PASSWORD') }}'"
  changed_when: false
  no_log: true

- name: Ensure postgres database is owned by pricetracker
  become: yes
  become_user: postgres
  shell:
    cmd: |
      psql -tc "SELECT 1 FROM pg_database WHERE datname='postgres' AND pg_get_userbyid(pg_database_owner)='pricetracker'" | grep -q 1 || \
      ( psql -c "ALTER DATABASE postgres OWNER TO pricetracker" && \
        psql -c "GRANT ALL ON DATABASE postgres TO pricetracker" )
  changed_when: false
  no_log: true
