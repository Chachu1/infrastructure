---
# Caddy role - reverse proxy with automatic HTTPS

- name: Install Caddy dependencies
  apt:
    name:
      - debian-keyring
      - debian-archive-keyring
      - apt-transport-https
      - curl
    state: present

- name: Add Caddy GPG key
  apt_key:
    url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
    state: present

- name: Add Caddy repository
  apt_repository:
    repo: "deb https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main"
    state: present
    filename: caddy-stable

- name: Install Caddy (for service file and user)
  apt:
    name: caddy
    state: present
    update_cache: yes

- name: Download Caddy with Cloudflare DNS module
  get_url:
    url: "https://caddyserver.com/api/download?os=linux&arch=amd64&p=github.com%2Fcaddy-dns%2Fcloudflare"
    dest: /tmp/caddy-custom
    mode: "0755"
  notify: restart caddy

- name: Replace Caddy binary with custom build
  copy:
    src: /tmp/caddy-custom
    dest: /usr/bin/caddy
    mode: "0755"
    remote_src: yes
  notify: restart caddy

- name: Create Caddy systemd drop-in directory
  file:
    path: /etc/systemd/system/caddy.service.d
    state: directory
    mode: "0755"

- name: Set Cloudflare API token for Caddy DNS challenge
  copy:
    dest: /etc/systemd/system/caddy.service.d/cloudflare.conf
    content: |
      [Service]
      Environment=CLOUDFLARE_API_TOKEN={{ lookup('env', 'CLOUDFLARE_API_TOKEN') }}
    mode: "0644"
  register: caddy_env

- name: Reload systemd for Caddy drop-in
  systemd:
    daemon_reload: yes
  when: caddy_env.changed

- name: Deploy Caddyfile
  template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    backup: yes
  notify: restart caddy

- name: Ensure Caddy is running
  systemd:
    name: caddy
    state: started
    enabled: yes
