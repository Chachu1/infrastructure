---
# Caddy role - reverse proxy with automatic HTTPS

- name: Install Caddy dependencies
  apt:
    name:
      - debian-keyring
      - debian-archive-keyring
      - apt-transport-https
      - curl
    state: present

- name: Add Caddy GPG key
  apt_key:
    url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
    state: present

- name: Add Caddy repository
  apt_repository:
    repo: "deb https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main"
    state: present
    filename: caddy-stable

- name: Install Caddy
  apt:
    name: caddy
    state: present
    update_cache: yes

- name: Create Caddy environment file
  copy:
    dest: /etc/caddy/env
    content: "CF_API_TOKEN={{ lookup('env', 'CLOUDFLARE_API_TOKEN') }}"
    owner: root
    group: caddy
    mode: "0640"
  notify: restart caddy

- name: Create Caddy systemd override directory
  file:
    path: /etc/systemd/system/caddy.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure Caddy to load environment file
  lineinfile:
    path: /etc/systemd/system/caddy.service.d/override.conf
    create: yes
    owner: root
    group: root
    mode: "0644"
    content: |
      [Service]
      EnvironmentFile=/etc/caddy/env
  notify:
    - reload systemd
    - restart caddy

- name: Deploy Caddyfile
  template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    backup: yes
  notify: reload caddy

- name: Ensure Caddy is running
  systemd:
    name: caddy
    state: started
    enabled: yes
