---
# WireGuard role - VPN tunnels

- name: Install WireGuard
  apt:
    name:
      - wireguard
      - wireguard-tools
    state: present

- name: Generate WireGuard private key (if not set)
  shell: wg genkey
  register: wg_key_result
  changed_when: false
  when: wireguard_private_key is not defined

- name: Set WireGuard private key fact
  set_fact:
    wireguard_private_key: "{{ wg_key_result.stdout }}"
  when: wireguard_private_key is not defined

- name: Generate WireGuard public key
  shell: "echo '{{ wireguard_private_key }}' | wg pubkey"
  register: wg_pubkey_result
  changed_when: false
  when: wireguard_public_key is not defined

- name: Set WireGuard public key fact
  set_fact:
    wireguard_public_key: "{{ wg_pubkey_result.stdout }}"
  when: wireguard_public_key is not defined

- name: Deploy WireGuard configuration
  template:
    src: wg0.conf.j2
    dest: /etc/wireguard/wg0.conf
    mode: "0600"
  notify: restart wireguard

- name: Enable WireGuard service
  systemd:
    name: wg-quick@wg0
    state: started
    enabled: yes
