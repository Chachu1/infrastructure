---
# WireGuard role - VPN client connecting to home network

- name: Install WireGuard and iptables
  apt:
    name:
      - wireguard
      - wireguard-tools
      - iptables
    state: present

- name: Deploy WireGuard configuration
  template:
    src: wg0.conf.j2
    dest: /etc/wireguard/wg0.conf
    mode: "0600"
  notify: restart wireguard

- name: Enable WireGuard service
  systemd:
    name: wg-quick@wg0
    state: started
    enabled: yes
  ignore_errors: yes
