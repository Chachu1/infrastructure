---
# Docker host role - for app VMs that need Docker

- name: Install Docker dependencies
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present

- name: Create APT keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Remove stale Docker GPG key
  file:
    path: /etc/apt/keyrings/docker.asc
    state: absent

- name: Add Docker GPG key
  shell: curl -fsSL https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.asc
  args:
    creates: /etc/apt/keyrings/docker.asc

- name: Add Docker repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Install Docker
  apt:
    name: "{{ docker_packages }}"
    state: present
    update_cache: yes
    dpkg_options: force-overwrite

- name: Enable Docker service
  systemd:
    name: docker
    state: started
    enabled: yes
