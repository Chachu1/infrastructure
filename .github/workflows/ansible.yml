name: Ansible Deploy

on:
  push:
    branches: [main]
    paths:
      - 'ansible/**'
      - 'configs/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: [self-hosted, proxmox]
    defaults:
      run:
        working-directory: ansible

    steps:
      - uses: actions/checkout@v5

      - name: Setup SSH Key
        run: |
          mkdir -p /home/runner/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /home/runner/.ssh/id_ed25519
          chmod 600 /home/runner/.ssh/id_ed25519
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > /home/runner/.ssh/id_ed25519.pub

      - name: Run Ansible Playbook
        run: ansible-playbook playbooks/site.yml
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
